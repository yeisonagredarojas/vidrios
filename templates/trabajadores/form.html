{% extends 'base.html' %}
{% block title %}Trabajador{% endblock %}
{% block page_title %}{% if trabajador %}Editar Trabajador{% else %}Nuevo Trabajador{% endif %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <form method="post">{% csrf_token %}{{ form.as_p }}
          <button class="btn btn-primary">Guardar</button>
          <a href="{% url 'lista_trabajadores' %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
