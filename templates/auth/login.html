{% extends 'base.html' %}
{% block auth_content %}
<div style="min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);display:flex;align-items:center;justify-content:center;">
  <div style="width:100%;max-width:420px;padding:1rem;">
    <div class="card shadow-lg border-0" style="border-radius:20px;overflow:hidden;">
      <div style="background:linear-gradient(135deg,#1a56db,#0ea5e9);padding:2rem;text-align:center;">
        <div style="width:60px;height:60px;background:rgba(255,255,255,.15);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:1.8rem;color:#fff;margin-bottom:1rem;">
          🪟
        </div>
        <h4 style="color:#fff;font-weight:800;margin:0;">ERP Vidrios</h4>
        <p style="color:rgba(255,255,255,.8);font-size:.85rem;margin:.3rem 0 0;">Sistema de Gestión Empresarial</p>
      </div>
      <div class="card-body p-4">
        <h5 class="fw-700 mb-1">Iniciar Sesión</h5>
        <p class="text-muted small mb-4">Ingresa tus credenciales para continuar</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-600 small">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Tu usuario" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-600 small">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required>
            </div>
          </div>
          {% if form.errors %}
          <div class="alert alert-danger py-2 small">Usuario o contraseña incorrectos.</div>
          {% endif %}
          <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Sistema
          </button>
        </form>
      </div>
    </div>
    <p class="text-center mt-3" style="color:rgba(255,255,255,.5);font-size:.78rem;">
      <a href="{% url 'landing' %}" style="color:rgba(255,255,255,.7);">← Ver sitio público</a>
    </p>
  </div>
</div>
{% endblock %}
