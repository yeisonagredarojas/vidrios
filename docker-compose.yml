version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: vidrios_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vidrios_db
      POSTGRES_USER: vidrios_user
      POSTGRES_PASSWORD: vidrios_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidrios_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: vidrios_api
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python inicializar.py && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: dev-secret-key-cambiar-en-produccion
      DEBUG: "True"
      DB_NAME: vidrios_db
      DB_USER: vidrios_user
      DB_PASSWORD: vidrios_pass
      DB_HOST: db
      DB_PORT: "5432"
      ALLOWED_HOSTS: "*"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
